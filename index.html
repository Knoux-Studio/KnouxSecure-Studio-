
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KnouxSecure Studio™</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: 'var(--neon-purple)',
            'accent-glow': 'var(--neon-glow)',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #050508;
      --text-color: #E2E8F0;
      --glass-bg: rgba(255, 255, 255, 0.02);
      --glass-border: rgba(255, 255, 255, 0.08);
      --neon-purple: #A855F7;
      --neon-glow: rgba(168, 85, 247, 0.4);
    }

    .light {
      --bg-color: #F1F5F9;
      --text-color: #0F172A;
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(0, 0, 0, 0.06);
      --neon-purple: #7C3AED;
      --neon-glow: rgba(124, 58, 237, 0.15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      overflow: hidden;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
    }

    .glass-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      border-color: var(--neon-purple);
      box-shadow: 0 0 30px -5px var(--neon-glow);
      transform: translateY(-8px);
    }

    .neon-text {
      color: var(--neon-purple);
      text-shadow: 0 0 12px var(--neon-glow);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-reveal {
      animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%, 45%, 75% { transform: translateX(-6px); }
      30%, 60%, 90% { transform: translateX(6px); }
    }

    .animate-shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes pulseGlow {
      0%, 100% {
        box-shadow: 0 0 25px var(--neon-glow), inset 0 0 15px var(--neon-glow);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 50px var(--neon-purple), inset 0 0 30px var(--neon-purple);
        transform: scale(1.05);
      }
    }
    
    .logo-glow {
      animation: pulseGlow 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes rotateRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .rotate-slow {
      animation: rotateRing 15s linear infinite;
    }

    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }

    .code-font {
      font-family: 'Fira Code', monospace;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",

    "lucide-react": "https://esm.sh/lucide-react@0.460.0",
    "recharts": "https://esm.sh/recharts@2.13.0",
    "@google/genai": "https://esm.sh/@google/genai@0.21.0",

    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
